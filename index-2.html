<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#15191c">
<title>Pruefungstrainer — Sport- und Fitnesskaufmann</title>
<style>
  :root{
    --ink:#15191c;
    --ink-2:#1c2226;
    --paper:#ece7dc;
    --paper-dim:#bdb6a6;
    --signal:#ff6a3d;
    --signal-dim:#c1502c;
    --ok:#6aab7c;
    --bad:#d9534f;
    --line:#33393d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family: "Helvetica Neue", Arial, sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:760px;
    margin:0 auto;
    padding:18px 16px 60px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:2px solid var(--signal);
    padding-bottom:10px;
    margin-bottom:18px;
  }
  .brand{
    font-weight:800;
    font-size:1.05rem;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  .brand span{color:var(--signal);}
  .meta{
    font-size:0.72rem;
    color:var(--paper-dim);
    letter-spacing:0.05em;
    text-transform:uppercase;
  }

  .panel{
    background:var(--ink-2);
    border:1px solid var(--line);
    border-radius:4px;
    padding:16px;
    margin-bottom:14px;
  }

  h2.section-label{
    font-size:0.7rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--signal);
    margin:0 0 10px;
    font-weight:700;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .chip{
    border:1px solid var(--line);
    background:transparent;
    color:var(--paper);
    padding:7px 12px;
    border-radius:99px;
    font-size:0.8rem;
    cursor:pointer;
    transition:all .12s ease;
  }
  .chip:hover{border-color:var(--signal);}
  .chip.active{
    background:var(--signal);
    border-color:var(--signal);
    color:#1a1a1a;
    font-weight:700;
  }
  .chip .pct{
    opacity:0.7;
    font-size:0.72rem;
    margin-left:4px;
  }

  .free-input{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .free-input input{
    flex:1;
    background:var(--ink);
    border:1px solid var(--line);
    color:var(--paper);
    padding:9px 10px;
    border-radius:4px;
    font-size:0.85rem;
  }
  .free-input input:focus{outline:none;border-color:var(--signal);}
  .btn{
    background:var(--signal);
    color:#1a1a1a;
    border:none;
    padding:9px 16px;
    border-radius:4px;
    font-weight:700;
    font-size:0.85rem;
    cursor:pointer;
    text-transform:uppercase;
    letter-spacing:0.03em;
  }
  .btn:hover{background:var(--signal-dim);}
  .btn.secondary{
    background:transparent;
    border:1px solid var(--line);
    color:var(--paper);
  }
  .btn.secondary:hover{border-color:var(--signal);}
  .btn.ghost{
    background:transparent;
    border:none;
    color:var(--paper-dim);
    text-transform:none;
    font-weight:400;
    padding:4px 0;
    font-size:0.78rem;
    text-decoration:underline;
  }

  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

  /* question card */
  .qcard{
    background:var(--ink-2);
    border:1px solid var(--line);
    border-left:4px solid var(--signal);
    border-radius:4px;
    padding:20px;
  }
  .qtopic{
    font-size:0.68rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--paper-dim);
    margin-bottom:8px;
  }
  .qtype{
    color:var(--signal);
    font-weight:700;
  }
  .qtext{
    font-size:1.05rem;
    line-height:1.5;
    margin-bottom:16px;
    white-space:pre-wrap;
  }
  .situation{
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:4px;
    padding:10px 12px;
    font-size:0.85rem;
    color:var(--paper-dim);
    margin-bottom:14px;
    white-space:pre-wrap;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:16px;
  }
  .option{
    border:1px solid var(--line);
    border-radius:4px;
    padding:10px 12px;
    cursor:pointer;
    font-size:0.92rem;
    display:flex;
    gap:10px;
  }
  .option:hover{border-color:var(--signal);}
  .option .num{color:var(--signal-dim);font-weight:700;}
  .option.correct{border-color:var(--ok);background:rgba(106,171,124,0.12);}
  .option.wrong{border-color:var(--bad);background:rgba(217,83,79,0.12);}
  .option.disabled{cursor:default;}

  .calc-input{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .calc-input input{
    background:var(--ink);
    border:1px solid var(--line);
    color:var(--paper);
    padding:10px 12px;
    border-radius:4px;
    font-size:1rem;
    width:160px;
  }
  .calc-input input:focus{outline:none;border-color:var(--signal);}

  textarea.open-answer{
    width:100%;
    min-height:90px;
    background:var(--ink);
    border:1px solid var(--line);
    color:var(--paper);
    padding:10px 12px;
    border-radius:4px;
    font-size:0.9rem;
    font-family:inherit;
    resize:vertical;
    margin-bottom:10px;
  }
  textarea.open-answer:focus{outline:none;border-color:var(--signal);}

  .feedback{
    border-radius:4px;
    padding:12px 14px;
    margin-bottom:14px;
    font-size:0.88rem;
    line-height:1.5;
    white-space:pre-wrap;
  }
  .feedback.ok{background:rgba(106,171,124,0.12);border:1px solid var(--ok);color:#cfe8d6;}
  .feedback.bad{background:rgba(217,83,79,0.12);border:1px solid var(--bad);color:#f3cfcd;}
  .feedback .label{
    font-weight:700;
    text-transform:uppercase;
    font-size:0.72rem;
    letter-spacing:0.08em;
    display:block;
    margin-bottom:4px;
  }
  .explain{
    color:var(--paper-dim);
    font-size:0.82rem;
    margin-top:8px;
    border-top:1px solid var(--line);
    padding-top:8px;
  }

  .controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:6px;
  }

  .stats-line{
    font-size:0.75rem;
    color:var(--paper-dim);
    margin-top:14px;
    display:flex;
    justify-content:space-between;
  }

  .empty{
    text-align:center;
    color:var(--paper-dim);
    padding:30px 10px;
    font-size:0.9rem;
  }

  footer{
    text-align:center;
    color:var(--paper-dim);
    font-size:0.7rem;
    margin-top:24px;
    letter-spacing:0.04em;
  }

  @media (max-width:480px){
    .qtext{font-size:0.98rem;}
    .calc-input input{width:120px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">Prüfungs<span>trainer</span></div>
    <div class="meta">Sport-/Fitnesskaufmann · IHK</div>
  </header>

  <div class="panel">
    <h2 class="section-label">Thema wählen</h2>
    <div class="chips" id="topicChips"></div>

    <div class="free-input">
      <input type="text" id="freeTopic" placeholder="oder eigenes Thema eintippen, z.B. 'Inventur' oder 'Kalkulation'" />
      <button class="btn secondary" id="freeTopicBtn">Suchen</button>
    </div>
    <div class="row" style="margin-top:10px;">
      <button class="chip" id="weakModeBtn">🎯 Schwachstellen-Modus</button>
      <button class="chip" id="mixModeBtn">🔀 Gemischt (alles)</button>
    </div>
  </div>

  <div class="panel">
    <h2 class="section-label">Format</h2>
    <div class="chips" id="formatChips"></div>
  </div>

  <div id="questionArea"></div>

  <footer>165 W24/S25-Aufgaben &amp; deine Notizen als Quelle · läuft komplett offline im Browser<br>
    <button class="btn ghost" id="resetStatsBtn" style="margin-top:6px;">Fortschritt zurücksetzen</button>
  </footer>

</div>

<script>
(function(){

// ---------------------------------------------------------------
// QUESTION BANK
// types: mc (multiple choice, single correct unless multi:true),
//        calc (numeric answer with tolerance),
//        open (free text, shows model answer),
//        order (ranking - simplified to MC of correct sequence for now folded into 'mc')
// ---------------------------------------------------------------

const BANK = [

// ---------------- BUCHFÜHRUNG / BILANZ (Schwachstelle) ----------------
{topic:"Buchführung", weak:true, type:"open",
 q:"Wann ist man laut HGB Kaufmann?",
 model:"Kaufmann ist, wer ein Handelsgewerbe betreibt: regelmäßig Geschäfte mit Gewinnerzielungsabsicht macht (§1 HGB). Es kommt auf Art und Umfang des Geschäftsbetriebs an, nicht auf die Rechtsform."},
{topic:"Buchführung", weak:true, type:"open",
 q:"Was ist der Unterschied zwischen doppelter und einfacher Buchführung?",
 model:"Doppelte Buchführung: jeder Geschäftsvorfall wird auf mind. 2 Konten erfasst, Ergebnis über Bilanz und GuV-Rechnung ermittelt. Einfache Buchführung (Einnahmen-Überschuss-Rechnung): nur Einnahmen und Ausgaben werden gegenübergestellt, Ergebnis = Überschuss."},
{topic:"Buchführung", weak:true, type:"open",
 q:"Was ist Inventur, was ist Inventar?",
 model:"Inventur = die körperliche und nichtkörperliche Bestandsaufnahme aller Vermögensgegenstände und Schulden eines Unternehmens zu einem Stichtag. Inventar = das Ergebnis der Inventur, d.h. die komprimierte und bewertete Liste dieser Ergebnisse — Grundlage zur Erstellung der Bilanz."},
{topic:"Buchführung", weak:true, type:"open",
 q:"Wie lautet die Grundgleichung der Bilanz (Eigenkapital ermitteln)?",
 model:"Vermögen − Schulden = Eigenkapital. Auf der Aktivseite steht das Vermögen (Mittelverwendung), auf der Passivseite Eigenkapital + Schulden (Mittelherkunft)."},
{topic:"Buchführung", weak:true, type:"mc",
 q:"Stellen Sie fest, welcher Sachverhalt zur Bilanz bzw. zum Inventar zutreffend ist!",
 options:[
   "Die Passivseite der Bilanz zeigt, wofür das Kapital des Unternehmens investiert wurde.",
   "Die Aktivseite der Bilanz zeigt, wie sich das Unternehmen finanziert.",
   "Das Eigenkapital kann aus der Differenz zwischen Gesamtvermögen und Fremdkapital errechnet werden.",
   "Das Inventar wird in Kontenform dargestellt und ist die Kurzfassung der Bilanz.",
   "Die Bilanz wird in Staffelform aufgestellt und ist die ausführliche Fassung des Inventars."
 ], correct:[2],
 explain:"Aktiva = Mittelverwendung, Passiva = Mittelherkunft. EK = Vermögen − Schulden. Das Inventar ist die ausführliche Liste, die Bilanz die verdichtete Kontenform-Darstellung — also genau umgekehrt zu den anderen Aussagen."},
{topic:"Buchführung", weak:true, type:"mc",
 q:"Stellen Sie fest, welche Aussage zu den Bestandskonten falsch ist!",
 options:[
   "Aktivkonten können nur Konten des Anlage- und Umlaufvermögens sein.",
   "Passivkonten sind alle Schuldkonten der Fitness GmbH.",
   "In einem Aktivkonto ergeben Anfangsbestand + Zugänge − Abgänge den Schlussbestand = Saldo.",
   "Jeder Geschäftsfall verursacht eine Minderung auf mindestens zwei Bestandskonten.",
   "Die Bestandskonten werden über das Schlussbilanzkonto abgeschlossen."
 ], correct:[3],
 explain:"Falsch: Ein Geschäftsfall kann auch Mehrungen verursachen (z.B. Aktivtausch: ein Konto +, ein Konto −, oder Bilanzverlängerung: beide +). Es ist nicht immer eine 'Minderung auf mindestens zwei Konten'."},
{topic:"Buchführung", weak:true, type:"mc",
 q:"Stellen Sie fest, welche Aussage zum Gewinn- und Verlustkonto im System der Finanzbuchhaltung korrekt ist!",
 options:[
   "Das Gewinn- und Verlustkonto ist ein aktives Bestandskonto.",
   "Das Gewinn- und Verlustkonto ist ein passives Bestandskonto.",
   "Das Gewinn- und Verlustkonto ist ein Aufwandskonto.",
   "Das Gewinn- und Verlustkonto ist ein Ertragskonto.",
   "Das Gewinn- und Verlustkonto ist ein Sammelkonto für alle Aufwands- und Ertragskonten und stellt ein Unterkonto für das Konto Eigenkapital dar."
 ], correct:[4]},
{topic:"Buchführung", weak:true, type:"open",
 q:"Wie schließt man das Gewinn- und Verlustkonto korrekt ab?",
 model:"Über das Konto Eigenkapital: ein Gewinn erhöht das Eigenkapital (Saldo des GuV-Kontos wird ins Eigenkapitalkonto auf die Habenseite übertragen), ein Verlust mindert es entsprechend auf der Sollseite."},
{topic:"Buchführung", weak:true, type:"mc",
 q:"Die Ergebnistabelle unterscheidet 3 Ergebnisarten. Welche Berechnung ergibt das Betriebsergebnis?",
 options:["Erträge − Aufwendungen","neutrales Ergebnis + Betriebsergebnis","neutrale Erträge − neutrale Aufwendungen","Leistungen − Kosten","Gesamtergebnis − Betriebsergebnis"],
 correct:[3],
 explain:"Betriebsergebnis = Leistungen − Kosten (Ergebnis aus der Kosten- und Leistungsrechnung, betrieblicher Bereich). Gesamtergebnis = Erträge − Aufwendungen. Neutrales Ergebnis = Gesamtergebnis − Betriebsergebnis bzw. neutrale Erträge − neutrale Aufwendungen."},
{topic:"Buchführung", type:"mc",
 q:"Stellen Sie fest, welche Funktion der Betriebsabrechnungsbogen (BAB) in der Kosten- und Leistungsrechnung erfüllt!",
 options:[
   "Im BAB werden Aufwendungen und Erträge zur Gewinnermittlung gegenübergestellt.",
   "Im BAB wird analysiert, welche Arten von Kosten entstanden sind und wie diese sich verhalten.",
   "Im BAB werden periodenfremde, außergewöhnliche, betriebsfremde Aufwendungen und Erträge abgegrenzt.",
   "Im BAB werden Angebote von Lieferern miteinander verglichen.",
   "Im BAB werden die Gemeinkosten (Handlungskosten) auf einzelne Kostenstellen aufgeteilt."
 ], correct:[4]},

// ---------------- KONTENABSCHLUSS / ÜBERHÄNGE ----------------
{topic:"Buchführung", weak:true, type:"open",
 q:"Was versteht man unter einem Sollüberhang bzw. einem Habenüberhang bei der Kontenabrechnung?",
 model:"Sollüberhang: die Summe der Sollbuchungen ist größer als die Summe der Habenbuchungen — der Saldo (Differenzbetrag) wird zum Ausgleich auf der Habenseite eingetragen. Habenüberhang: die Summe der Habenbuchungen ist größer — der Saldo wird auf der Sollseite eingetragen. So werden am Ende beide Kontoseiten gleich hoch (Kontoabschluss)."},
{topic:"Buchführung", weak:true, type:"calc",
 q:"Auf einem Aktivkonto stehen im Soll: Anfangsbestand 4.200 € und Zugänge von 1.850 €. Im Haben stehen Abgänge von 2.100 €. Wie hoch ist der Schlussbestand (Saldo)?",
 calc:()=>{ const soll=4200+1850; const haben=2100; const saldo=soll-haben; return {answer:saldo, unit:"€"};},
 explain:"Sollseite: 4.200 + 1.850 = 6.050 €. Habenseite: 2.100 €. Saldo (Sollüberhang) = 6.050 − 2.100 = 3.950 €. Er wird im Haben als Schlussbestand eingetragen, damit das Konto ausgeglichen ist."},
{topic:"Buchführung", weak:true, type:"open",
 q:"Auf welcher Seite des Kontos wird bei einem Passivkonto der Schlussbestand eingetragen, und warum?",
 model:"Im Soll. Passivkonten werden im Haben eröffnet (Anfangsbestand) und durch Zugänge im Haben erhöht, durch Abgänge im Soll vermindert. Da die Habenseite i.d.R. größer ist (Habenüberhang), wird der Saldo zum Ausgleich auf der Sollseite eingetragen — das ist gleichzeitig der Schlussbestand, der ins Schlussbilanzkonto (Haben) übertragen wird."},
{topic:"Buchführung", weak:true, type:"mc",
 q:"Welche Aussage zum Kontenabschluss ist korrekt?",
 options:[
   "Ein Aktivkonto wird durch eine Eintragung im Haben (Schlussbestand) ausgeglichen, ein Passivkonto durch eine Eintragung im Soll.",
   "Aufwandskonten werden grundsätzlich durch einen Habenüberhang abgeschlossen.",
   "Der Saldo eines Erfolgskontos wird stets ins Schlussbilanzkonto übertragen.",
   "Ertragskonten haben im Normalfall einen Sollüberhang.",
   "Bestandskonten werden über das Gewinn- und Verlustkonto abgeschlossen."
 ], correct:[0],
 explain:"Aktivkonten haben i.d.R. einen Sollüberhang (AB+Zugänge im Soll), der durch eine Eintragung im Haben (Schlussbestand) ausgeglichen wird. Passivkonten haben i.d.R. einen Habenüberhang, ausgeglichen durch eine Eintragung im Soll."},
{topic:"Buchführung", weak:true, type:"calc",
 q:"Ein Wareneinkaufskonto (Aufwandskonto) hat im Soll Buchungen von insgesamt 18.400 €, im Haben (Korrekturbuchung) 600 €. Wie hoch ist der Saldo, der ins Gewinn- und Verlustkonto übertragen wird?",
 calc:()=>{ const soll=18400; const haben=600; const saldo=soll-haben; return {answer:saldo, unit:"€"};},
 explain:"Saldo = 18.400 − 600 = 17.800 €. Da es ein Aufwandskonto ist (Sollüberhang), wird der Saldo ins GuV-Konto auf die Sollseite übertragen (Aufwand mindert den Gewinn)."},
{topic:"Buchführung", weak:true, type:"open",
 q:"Erklären Sie, warum ein Ertragskonto im Normalfall einen Habenüberhang aufweist.",
 model:"Erträge werden grundsätzlich im Haben gebucht (Zunahme des Eigenkapitals). Da es i.d.R. keine oder nur wenige Korrekturbuchungen im Soll gibt, übersteigt die Habenseite die Sollseite deutlich — daher Habenüberhang. Der Saldo wird zum Ausgleich im Soll eingetragen und ins GuV-Konto auf die Habenseite übertragen (Ertrag erhöht den Gewinn)."},

// ---------------- KONTIERUNG ----------------
{topic:"Kontierung", weak:true, type:"open",
 q:"Buchungssatz: Kauf eines PKWs auf Ziel, Rechnung über 25.850 € netto.",
 model:"Fuhrpark an Verbindlichkeiten aus Lieferungen und Leistungen 25.850 €. (Bei Berücksichtigung der Vorsteuer: Fuhrpark + Vorsteuer an Verbindlichkeiten a.L.L.)"},
{topic:"Kontierung", weak:true, type:"open",
 q:"Buchungssatz: Ein Kunde bezahlt eine offene Rechnung per Banküberweisung.",
 model:"Bank an Forderungen aus Lieferungen und Leistungen."},
{topic:"Kontierung", weak:true, type:"open",
 q:"Buchungssatz: Barkauf von Handelswaren.",
 model:"Wareneinkauf (bzw. Wareneingang) an Kasse."},
{topic:"Kontierung", weak:true, type:"open",
 q:"Buchungssatz: Umwandlung einer Verbindlichkeit aus Lieferungen und Leistungen in ein Darlehen.",
 model:"Verbindlichkeiten aus Lieferungen und Leistungen an Darlehen (bzw. Verbindlichkeiten gegenüber Kreditinstituten)."},
{topic:"Kontierung", type:"mc",
 q:"Sie sollen eine Ausgangsrechnung kontieren (Warenverkauf gegen Rechnung, inkl. Umsatzsteuer). Welche Konten werden im Soll und welche im Haben angesprochen?",
 options:[
   "Soll: Forderungen a.L.L. / Haben: Warenverkauf, Umsatzsteuer",
   "Soll: Warenverkauf, Umsatzsteuer / Haben: Forderungen a.L.L.",
   "Soll: Kasse / Haben: Wareneinkauf, Vorsteuer",
   "Soll: Verbindlichkeiten a.L.L. / Haben: Warenverkauf, Umsatzsteuer",
   "Soll: Forderungen a.L.L., Vorsteuer / Haben: Warenverkauf"
 ], correct:[0],
 explain:"Bei einer Ausgangsrechnung (Verkauf) entsteht eine Forderung (Soll, da Forderungen ein Aktivkonto sind und zunehmen), im Haben stehen der Erlös (Warenverkauf) und die geschuldete Umsatzsteuer."},
{topic:"Kontierung", type:"mc",
 q:"Sie kontieren eine Eingangsrechnung für Bürobedarf (Wareneinkauf für eigenen Verbrauch, nicht zum Weiterverkauf). Welche Buchung ist korrekt?",
 options:[
   "Bürobedarf, Vorsteuer an Verbindlichkeiten a.L.L.",
   "Verbindlichkeiten a.L.L. an Bürobedarf, Vorsteuer",
   "Wareneinkauf, Vorsteuer an Verbindlichkeiten a.L.L.",
   "Bürobedarf an Vorsteuer",
   "Kasse an Bürobedarf"
 ], correct:[0]},

// ---------------- LOGIK: AKTIV/PASSIV, SOLL/HABEN ----------------
{topic:"Kontierung", weak:true, type:"mc",
 q:"Wie verändert sich ein Aktivkonto bei einem Zugang (Mehrung)?",
 options:["Buchung im Soll","Buchung im Haben","Keine Buchung nötig","Nur im Inventar erfasst","Abhängig vom Kontotyp"],
 correct:[0],
 explain:"Aktivkonten werden bei Mehrungen im Soll gebucht — auf der gleichen Seite wie der Anfangsbestand."},
{topic:"Kontierung", weak:true, type:"mc",
 q:"Wie verändert sich ein Passivkonto bei einem Zugang (Mehrung)?",
 options:["Buchung im Haben","Buchung im Soll","Keine Buchung nötig","Nur im Inventar erfasst","Abhängig vom Kontotyp"],
 correct:[0],
 explain:"Passivkonten werden bei Mehrungen im Haben gebucht — auf der gleichen Seite wie der Anfangsbestand."},
{topic:"Kontierung", weak:true, type:"mc",
 q:"Ein Aufwandskonto wird grundsätzlich auf welcher Seite gebucht?",
 options:["Soll","Haben","Beide Seiten gleich häufig","Nur am Periodenende","Abhängig vom Aufwandstyp"],
 correct:[0],
 explain:"Aufwendungen mindern das Eigenkapital und werden daher im Soll gebucht (wie eine Abgangsbuchung beim Eigenkapital)."},
{topic:"Kontierung", weak:true, type:"mc",
 q:"Ein Ertragskonto wird grundsätzlich auf welcher Seite gebucht?",
 options:["Haben","Soll","Beide Seiten gleich häufig","Nur am Periodenende","Abhängig vom Ertragstyp"],
 correct:[0],
 explain:"Erträge erhöhen das Eigenkapital und werden im Haben gebucht (wie eine Zugangsbuchung beim Eigenkapital)."},
{topic:"Kontierung", weak:true, type:"mc",
 q:"Geschäftsvorfall: 'Ein Mitglied zahlt seinen Jahresbeitrag in bar.' Welcher Buchungssatz ist korrekt?",
 options:["Kasse an Mitgliedsbeiträge","Mitgliedsbeiträge an Kasse","Bank an Mitgliedsbeiträge","Forderungen an Kasse","Kasse an Forderungen"],
 correct:[0],
 explain:"Die Kasse (Aktivkonto) nimmt zu → Soll. Der Ertrag (Mitgliedsbeiträge) entsteht → Haben. Buchungssatz: Kasse an Mitgliedsbeiträge."},

// ---------------- ZINSRECHNUNG ----------------
{topic:"Zinsrechnung", weak:true, type:"open",
 q:"Wie lautet die Grundformel der einfachen (kaufmännischen) Zinsrechnung?",
 model:"Zinsen = (Kapital × Zinssatz × Tage) ÷ (100 × 360). Bei der kaufmännischen (deutschen) Zinsrechnung wird mit einem 360-Tage-Jahr und 30-Tage-Monaten gerechnet."},
{topic:"Zinsrechnung", weak:true, type:"calc",
 q:"Kapital: 10.000 €. Zinssatz: 6% p.a. Zeitraum: 90 Tage. Wie hoch sind die Zinsen (kaufmännische Methode, 360-Tage-Jahr)?",
 calc:()=>{ const k=10000; const p=6; const t=90; const z=(k*p*t)/(100*360); return {answer: Math.round(z*100)/100, unit:"€"};},
 explain:"Zinsen = (10.000 × 6 × 90) / (100 × 360) = 150,00 €."},
{topic:"Zinsrechnung", weak:true, type:"calc",
 q:"Kapital 8.000 €, Zinsen für ein volles Jahr 320 €. Wie hoch ist der Zinssatz (in %)?",
 calc:()=>{ const k=8000; const z=320; const p=z/k*100; return {answer:p, unit:"%"};},
 explain:"Zinssatz = (Zinsen × 100) / Kapital = (320 × 100) / 8.000 = 4%."},
{topic:"Zinsrechnung", weak:true, type:"open",
 q:"Wie hängen Skonto und ein effektiver Jahreszins rechnerisch zusammen — was passiert, wenn man auf den Skontoabzug verzichtet?",
 model:"Verzichtet man auf Skonto und zahlt erst zum Zahlungsziel statt innerhalb der Skontofrist, 'verzinst' man den Rechnungsbetrag faktisch zu einem sehr hohen effektiven Jahreszins — man verschenkt den Skontobetrag für die zusätzliche Zahlungsfrist. Skonto kann daher als impliziter Kreditzins interpretiert werden: je kürzer die Differenz zwischen Skontofrist und Zahlungsziel, desto höher der effektive Jahreszins."},
{topic:"Zinsrechnung", weak:true, type:"calc",
 q:"Zahlungsziel 30 Tage, Skontofrist 10 Tage, Skontosatz 2%. Wie hoch ist der ungefähre effektive Jahreszins, wenn auf den Skontoabzug verzichtet wird? (Formel: Skontosatz × 360 ÷ (Zahlungsziel − Skontofrist))",
 calc:()=>{ const skonto=2; const zz=30; const sf=10; const eff=skonto*360/(zz-sf); return {answer: eff, unit:"%"};},
 explain:"Effektivzins ≈ 2 × 360 / (30−10) = 720/20 = 36% p.a. — Skonto auszulassen ist also faktisch ein sehr teurer 'Kredit'."},
{topic:"Zinsrechnung", weak:true, type:"calc",
 q:"Wie viele Tage muss ein Kapital von 5.000 € angelegt werden, damit es bei einem Zinssatz von 4% p.a. genau 50 € Zinsen erbringt (360-Tage-Jahr)?",
 calc:()=>{ const z=50; const k=5000; const p=4; const t=(z*100*360)/(k*p); return {answer:t, unit:"Tage"};},
 explain:"t = (Zinsen × 100 × 360) / (Kapital × Zinssatz) = (50 × 36.000) / (5.000 × 4) = 90 Tage."},

{topic:"Wirtschaft", type:"open",
 q:"Was versteht man unter dem Marktgleichgewicht (Gleichgewichtspreis)?",
 model:"Das Marktgleichgewicht liegt dort, wo sich Angebotskurve und Nachfragekurve schneiden — die angebotene Menge entspricht genau der nachgefragten Menge. Der zugehörige Preis heißt Gleichgewichtspreis (Markträumungspreis); es gibt dort weder einen Angebots- noch einen Nachfrageüberhang."},
{topic:"Wirtschaft", type:"calc",
 q:"Nachfragefunktion: Menge = 100 − 2×Preis. Angebotsfunktion: Menge = −20 + 4×Preis. Wie hoch ist der Gleichgewichtspreis?",
 calc:()=>{ return {answer:20, unit:"€"};},
 explain:"Gleichgewicht: 100 − 2p = −20 + 4p → 120 = 6p → p = 20 €."},
{topic:"Wirtschaft", type:"calc",

 calc:()=>{ const p=20; const menge=100-2*p; return {answer:menge, unit:"Stück"};},
 explain:"Menge = 100 − 2×20 = 60 Stück."},
{topic:"Wirtschaft", type:"open",
 q:"Was sagt die Preiselastizität der Nachfrage aus, und wie wird sie berechnet?",
 model:"Sie misst, wie stark sich die Nachfragemenge prozentual ändert, wenn sich der Preis um 1% ändert. Formel: Preiselastizität = prozentuale Mengenänderung ÷ prozentuale Preisänderung. Werte über 1 (Betrag) = elastische Nachfrage (starke Reaktion), Werte unter 1 = unelastische Nachfrage (schwache Reaktion)."},
{topic:"Wirtschaft", type:"calc",
 q:"Der Preis eines Produkts steigt von 10 € auf 12 € (+20%). Die Nachfrage sinkt von 200 auf 160 Stück (−20%). Wie hoch ist die Preiselastizität der Nachfrage (als Betrag, ohne Vorzeichen)?",
 calc:()=>{ const e=Math.abs(-20/20); return {answer:e, unit:""};},
 explain:"Preiselastizität = −20% / 20% = −1 (Betrag: 1) — die Nachfrage reagiert proportional zur Preisänderung, ein Grenzfall zwischen elastisch und unelastisch."},

async function saveStats(){
  try{ localStorage.setItem('pruefungstrainer-stats', JSON.stringify(stats)); }catch(e){}
}

function pct(t){
  const s = stats[t];
  if(!s || s.seen===0) return null;
  return Math.round((s.correct/s.seen)*100);
}

function weakTopics(){
  // topics sorted by lowest success rate, with min 1 attempt considered, else weak:true questions first
  return TOPICS.slice().sort((a,b)=>{
    const pa = pct(a), pb = pct(b);
    if(pa===null && pb===null) return 0;
    if(pa===null) return -1;
    if(pb===null) return 1;
    return pa-pb;
  });
}

// ---------------------------------------------------------------
// UI BUILD
// ---------------------------------------------------------------
const topicChips = document.getElementById('topicChips');
const formatChips = document.getElementById('formatChips');
const questionArea = document.getElementById('questionArea');

function renderTopicChips(){
  topicChips.innerHTML = '';
  TOPICS.forEach(t=>{
    const b = document.createElement('button');
    b.className = 'chip' + (activeTopic===t?' active':'');
    const p = pct(t);
    b.innerHTML = t + (p!==null ? `<span class="pct">${p}%</span>` : '');
    b.onclick = ()=>{ activeTopic = t; activeFormat='alle'; render(); nextQuestion(); };
    topicChips.appendChild(b);
  });
}

const FORMATS = [
  {key:'alle', label:'Alle Formate'},
  {key:'mc', label:'Multiple Choice'},
  {key:'calc', label:'Rechenaufgabe'},
  {key:'open', label:'Offene Frage'},
];
function renderFormatChips(){
  formatChips.innerHTML = '';
  FORMATS.forEach(f=>{
    const b = document.createElement('button');
    b.className = 'chip' + (activeFormat===f.key?' active':'');
    b.textContent = f.label;
    b.onclick = ()=>{ activeFormat = f.key; render(); nextQuestion(); };
    formatChips.appendChild(b);
  });
}

document.getElementById('weakModeBtn').onclick = ()=>{
  activeTopic = "__weak__";
  render();
  nextQuestion();
};
document.getElementById('mixModeBtn').onclick = ()=>{
  activeTopic = "Gemischt (alles)";
  render();
  nextQuestion();
};
document.getElementById('freeTopicBtn').onclick = ()=>{
  const val = document.getElementById('freeTopic').value.trim().toLowerCase();
  if(!val) return;
  const match = TOPICS.find(t=>t.toLowerCase().includes(val) || val.includes(t.toLowerCase()));
  if(match){ activeTopic = match; render(); nextQuestion(); }
  else{
    questionArea.innerHTML = `<div class="panel"><div class="empty">Kein Thema gefunden für "${val}". Verfügbare Themen: ${TOPICS.join(', ')}</div></div>`;
  }
};
document.getElementById('freeTopic').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('freeTopicBtn').click();
});

function render(){
  renderTopicChips();
  renderFormatChips();
}

function getPool(){
  let pool;
  if(activeTopic === "Gemischt (alles)"){
    pool = BANK;
  } else if(activeTopic === "__weak__"){
    const order = weakTopics();
    // weight: prefer questions flagged weak:true, then lowest-pct topics
    pool = BANK.filter(q=>q.weak) ;
    if(pool.length===0) pool = BANK;
    else {
      // mix in some non-weak questions from weakest topics too
      const weakestTopics = order.slice(0,3);
      pool = BANK.filter(q=> q.weak || weakestTopics.includes(q.topic));
    }
  } else {
    pool = BANK.filter(q=>q.topic===activeTopic);
  }
  if(activeFormat !== 'alle'){
    pool = pool.filter(q=>q.type===activeFormat);
  }
  return pool;
}

function nextQuestion(){
  const pool = getPool();
  if(pool.length===0){
    questionArea.innerHTML = `<div class="panel"><div class="empty">Keine Fragen in dieser Kombination gefunden. Wähl ein anderes Format oder Thema.</div></div>`;
    return;
  }
  current = pool[Math.floor(Math.random()*pool.length)];
  currentAnswered = false;
  renderQuestion();
}

function renderQuestion(){
  const q = current;
  let html = `<div class="qcard">`;
  html += `<div class="qtopic">${q.topic} · <span class="qtype">${typeLabel(q.type)}</span>${q.weak? ' · 🎯 Schwachstelle':''}</div>`;
  html += `<div class="qtext">${escapeHtml(q.q)}</div>`;

  if(q.type==='mc'){
    html += `<div class="options" id="optsWrap">`;
    q.options.forEach((opt,i)=>{
      html += `<div class="option" data-idx="${i}"><span class="num">${i+1}.</span><span>${escapeHtml(opt)}</span></div>`;
    });
    html += `</div>`;
    if(q.multi){
      html += `<button class="btn" id="submitMulti">Antwort prüfen</button>`;
    }
  } else if(q.type==='calc'){
    html += `<div class="calc-input"><input type="text" id="calcInput" placeholder="Zahl eingeben" /><button class="btn" id="submitCalc">Prüfen</button></div>`;
  } else if(q.type==='open'){
    html += `<textarea class="open-answer" id="openInput" placeholder="Deine Antwort (Stichpunkte reichen)..."></textarea>`;
    html += `<button class="btn" id="submitOpen">Lösung anzeigen</button>`;
  }

  html += `<div id="feedbackWrap"></div>`;
  html += `<div class="controls"><button class="btn secondary" id="skipBtn">Überspringen / Nächste →</button><span style="flex:1"></span></div>`;
  html += `</div>`;

  questionArea.innerHTML = html;
  attachHandlers();
}

function typeLabel(t){
  if(t==='mc') return 'Multiple Choice';
  if(t==='calc') return 'Rechenaufgabe';
  if(t==='open') return 'Offene Frage';
  return t;
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.innerText = s;
  return d.innerHTML;
}

function attachHandlers(){
  document.getElementById('skipBtn').onclick = nextQuestion;

  if(current.type==='mc'){
    const opts = document.querySelectorAll('#optsWrap .option');
    if(current.multi){
      let selected = new Set();
      opts.forEach(o=>{
        o.onclick = ()=>{
          if(currentAnswered) return;
          const idx = parseInt(o.dataset.idx);
          if(selected.has(idx)){ selected.delete(idx); o.style.borderColor='var(--line)'; }
          else { selected.add(idx); o.style.borderColor='var(--signal)'; }
        };
      });
      document.getElementById('submitMulti').onclick = ()=>{
        if(currentAnswered) return;
        currentAnswered = true;
        const correctSet = new Set(current.correct);
        const isCorrect = selected.size===correctSet.size && [...selected].every(x=>correctSet.has(x));
        opts.forEach(o=>{
          const idx = parseInt(o.dataset.idx);
          o.classList.add('disabled');
          if(correctSet.has(idx)) o.classList.add('correct');
          else if(selected.has(idx)) o.classList.add('wrong');
        });
        recordAnswer(isCorrect);
        showFeedback(isCorrect);
      };
    } else {
      opts.forEach(o=>{
        o.onclick = ()=>{
          if(currentAnswered) return;
          currentAnswered = true;
          const idx = parseInt(o.dataset.idx);
          const isCorrect = current.correct.includes(idx);
          opts.forEach(oo=>{
            oo.classList.add('disabled');
            const oidx = parseInt(oo.dataset.idx);
            if(current.correct.includes(oidx)) oo.classList.add('correct');
            else if(oidx===idx) oo.classList.add('wrong');
          });
          recordAnswer(isCorrect);
          showFeedback(isCorrect);
        };
      });
    }
  } else if(current.type==='calc'){
    document.getElementById('submitCalc').onclick = ()=>{
      if(currentAnswered) return;
      const val = parseFloat(document.getElementById('calcInput').value.replace(',','.'));
      if(isNaN(val)){ return; }
      currentAnswered = true;
      const result = current.calc();
      const tolerance = Math.max(0.05, Math.abs(result.answer)*0.01);
      const isCorrect = Math.abs(val - result.answer) <= tolerance;
      recordAnswer(isCorrect);
      showFeedback(isCorrect, `Richtige Lösung: ${result.answer}${result.unit?(' '+result.unit):''}`);
    };
    document.getElementById('calcInput').addEventListener('keydown', e=>{
      if(e.key==='Enter') document.getElementById('submitCalc').click();
    });
  } else if(current.type==='open'){
    document.getElementById('submitOpen').onclick = ()=>{
      if(currentAnswered) return;
      currentAnswered = true;
      recordAnswer(null); // open questions: self-assessed, count as "seen" not auto-graded
      const fb = document.getElementById('feedbackWrap');
      fb.innerHTML = `<div class="feedback ok"><span class="label">Musterlösung</span>${escapeHtml(current.model)}</div>
        <div class="row" style="margin-top:8px;">
          <button class="btn secondary" id="selfOk">Wusste ich ✓</button>
          <button class="btn secondary" id="selfBad">Wusste ich nicht ✗</button>
        </div>`;
      document.getElementById('selfOk').onclick = ()=>{ updateSelfAssess(true); };
      document.getElementById('selfBad').onclick = ()=>{ updateSelfAssess(false); };
    };
  }
}

function updateSelfAssess(correct){
  stats[current.topic].correct += correct?1:0;
  saveStats();
  render();
  document.getElementById('selfOk').disabled = true;
  document.getElementById('selfBad').disabled = true;
}

function recordAnswer(isCorrect){
  if(!stats[current.topic]) stats[current.topic] = {seen:0,correct:0};
  stats[current.topic].seen += 1;
  if(isCorrect===true) stats[current.topic].correct += 1;
  saveStats();
  render();
}

function showFeedback(isCorrect, extra){
  const fb = document.getElementById('feedbackWrap');
  let html = `<div class="feedback ${isCorrect?'ok':'bad'}"><span class="label">${isCorrect?'Richtig':'Leider falsch'}</span>`;
  if(extra) html += extra;
  if(current.explain) html += `<div class="explain">${escapeHtml(current.explain)}</div>`;
  html += `</div>`;
  fb.innerHTML = html;
}

// ---------------------------------------------------------------
// INIT
// ---------------------------------------------------------------
(async function init(){
  await loadStats();
  render();
  nextQuestion();
  document.getElementById('resetStatsBtn').onclick = ()=>{
    if(confirm('Gesamten Fortschritt wirklich zurücksetzen?')){
      stats = {};
      TOPICS.forEach(t=>{ stats[t] = {seen:0, correct:0}; });
      saveStats();
      render();
    }
  };
})();

})();
</script>
</body>
</html>
